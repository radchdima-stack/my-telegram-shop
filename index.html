<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; }
        .card { background: var(--tg-theme-secondary-bg-color); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
        .price { color: #31b545; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🛒 Магазин аккаунтов</h2>
    <div id="catalog">
        <div class="card">
            <div>
                <strong>FB KING</strong><br>
                <span class="price">10 TRX</span>
            </div>
            <button onclick="buy('FB KING', 1)">Купить</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function buy(category, qty) {
            // Отправляем данные обратно боту
            let data = { category: category, qty: qty };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
